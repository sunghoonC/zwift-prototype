<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZwiftBox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; }
  canvas { display: block; }
  #weather-panel {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    background: rgba(0,0,0,0.75); color: #fff; padding: 12px 14px;
    border-radius: 10px; font: 12px/1.6 -apple-system, sans-serif;
    min-width: 180px; backdrop-filter: blur(6px);
  }
  #weather-panel.collapsed > *:not(.panel-header) { display: none; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; margin-bottom: 6px; }
  .panel-header h3 { font-size: 12px; margin: 0; }
  .panel-header span { font-size: 16px; }
  #weather-panel label { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; }
  #weather-panel label span:first-child { opacity: 0.7; }
  #weather-panel input[type=range] { width: 90px; height: 4px; accent-color: #4af; }
  #weather-panel select { background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 2px 4px; font-size: 11px; }
  #weather-panel .val { min-width: 28px; text-align: right; font-variant-numeric: tabular-nums; }
  #weather-panel .divider { border-top: 1px solid rgba(255,255,255,0.15); margin: 6px 0; }
</style>
</head>
<body>

<div id="weather-panel">
  <div class="panel-header" onclick="this.parentElement.classList.toggle('collapsed')">
    <h3>Weather Control</h3><span>&#9662;</span>
  </div>
  <div id="manual-controls">
    <label><span>시간</span><input type="range" id="sl-hour" min="0" max="23" value="12"><span class="val" id="v-hour">12h</span></label>
    <label><span>날씨</span>
      <select id="sel-weather">
        <option value="0">맑음</option>
        <option value="2">구름 조금</option>
        <option value="3">흐림</option>
        <option value="45">안개</option>
        <option value="51">이슬비</option>
        <option value="53">가랑비</option>
        <option value="55">보슬비</option>
        <option value="61">비</option>
        <option value="63">큰비</option>
        <option value="65">폭우</option>
        <option value="71">싸락눈</option>
        <option value="73">눈</option>
        <option value="75">폭설</option>
        <option value="95">뇌우</option>
      </select>
    </label>
    <div class="divider"></div>
    <label><span>풍속</span><input type="range" id="sl-wind" min="0" max="50" value="3"><span class="val" id="v-wind">3</span></label>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ══════════════════════════════════════════════════════════════
//  Shared helpers
// ══════════════════════════════════════════════════════════════
const _d = new THREE.Object3D();
const _c = new THREE.Color();
const unitBox = new THREE.BoxGeometry(1, 1, 1);

function inst(mat, data, opts = {}) {
  const n = data.length;
  if (!n) return null;
  const m = new THREE.InstancedMesh(unitBox, mat, n);
  for (let i = 0; i < n; i++) {
    const t = data[i];
    _d.position.set(t.x, t.y, t.z);
    _d.scale.set(t.sx, t.sy, t.sz);
    _d.rotation.set(t.rx || 0, t.ry || 0, t.rz || 0);
    _d.updateMatrix();
    m.setMatrixAt(i, _d.matrix);
  }
  m.instanceMatrix.needsUpdate = true;
  m.castShadow = !!opts.shadow;
  m.receiveShadow = !!opts.recv;
  if (opts.noCull) m.frustumCulled = false;
  return m;
}

function addInst(m) { if (m) { m.computeBoundingSphere(); scene.add(m); } }

// ══════════════════════════════════════════════════════════════
//  Renderer (optimized for low-end GPU)
// ══════════════════════════════════════════════════════════════
const ASPECT = 9 / 16;
function calcSize() {
  const ww = window.innerWidth, wh = window.innerHeight;
  let w, h;
  if (ww / wh > ASPECT) { h = wh; w = Math.floor(h * ASPECT); }
  else { w = ww; h = Math.floor(w / ASPECT); }
  return { w, h };
}
const { w: initW, h: initH } = calcSize();

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(initW, initH);
renderer.setPixelRatio(1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.6;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 100, 200);
const camera = new THREE.PerspectiveCamera(55, ASPECT, 0.5, 500);
const clock = new THREE.Clock();

// ══════════════════════════════════════════════════════════════
//  Weather state
// ══════════════════════════════════════════════════════════════
const weather = { windSpeed: 3, windDir: 0, code: 0, isDay: 1, temp: 15, hour: 12 };

// ══════════════════════════════════════════════════════════════
//  Time-of-day presets
// ══════════════════════════════════════════════════════════════
function getTimePreset(hour) {
  if (hour >= 21 || hour < 5)   return { sky: 0x0f1535, fog: 0x0f1535, ambient: 0x4466aa, ambientI: 0.7, hemiSky: 0x223355, hemiGround: 0x222233, hemiI: 0.5, sunColor: 0x8899cc, sunI: 0.5, exposure: 1.3, shadowI: 0.1 };
  if (hour >= 5 && hour < 7)    return { sky: 0xff8844, fog: 0xdd7744, ambient: 0xcc8866, ambientI: 0.7, hemiSky: 0xff9955, hemiGround: 0x554433, hemiI: 0.6, sunColor: 0xffaa55, sunI: 0.9, exposure: 1.4, shadowI: 0.2 };
  if (hour >= 7 && hour < 10)   return { sky: 0x99ccee, fog: 0x99ccee, ambient: 0x99aabb, ambientI: 0.7, hemiSky: 0x99ccee, hemiGround: 0x556633, hemiI: 0.6, sunColor: 0xfff0d0, sunI: 1.2, exposure: 1.5, shadowI: 0.25 };
  if (hour >= 10 && hour < 16)  return { sky: 0x87CEEB, fog: 0x87CEEB, ambient: 0x8899bb, ambientI: 0.8, hemiSky: 0x87CEEB, hemiGround: 0x556633, hemiI: 0.7, sunColor: 0xfff4e0, sunI: 1.4, exposure: 1.6, shadowI: 0.3 };
  if (hour >= 16 && hour < 19)  return { sky: 0xdd8855, fog: 0xcc7744, ambient: 0xbb8866, ambientI: 0.7, hemiSky: 0xee8844, hemiGround: 0x554433, hemiI: 0.6, sunColor: 0xffaa44, sunI: 1.0, exposure: 1.4, shadowI: 0.2 };
  /* 19-21 */                    return { sky: 0x1a2744, fog: 0x1a2744, ambient: 0x556688, ambientI: 0.6, hemiSky: 0x334466, hemiGround: 0x333333, hemiI: 0.5, sunColor: 0x9999bb, sunI: 0.6, exposure: 1.3, shadowI: 0.15 };
}

// ══════════════════════════════════════════════════════════════
//  Lighting
// ══════════════════════════════════════════════════════════════
const ambientLight = new THREE.AmbientLight(0x8899bb, 0.8);
scene.add(ambientLight);
const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556633, 0.7);
scene.add(hemiLight);

const sun = new THREE.DirectionalLight(0xfff4e0, 1.4);
sun.position.set(80, 100, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -60;
sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60;
sun.shadow.camera.bottom = -60;
sun.shadow.camera.near = 10;
sun.shadow.camera.far = 300;
sun.shadow.radius = 4;
sun.shadow.intensity = 0.3;
sun.shadow.bias = -0.0005;
scene.add(sun);
scene.add(sun.target);

// ── Lamp material (shared, updated by applyWeather) ──
const lampMat = new THREE.MeshStandardMaterial({ color: 0xffeecc, emissive: 0xffeecc, emissiveIntensity: 0.3 });
let lampLightIntensity = 0;

// ══════════════════════════════════════════════════════════════
//  Rain / Snow — pre-allocated InstancedMesh
// ══════════════════════════════════════════════════════════════
const MAX_RAIN = 800, MAX_SNOW = 500;
const rainMat = new THREE.MeshBasicMaterial({ color: 0xaaccff, transparent: true, opacity: 0.6 });
const snowMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });

const rainGroup = new THREE.Group();
const snowGroup = new THREE.Group();
scene.add(rainGroup);
scene.add(snowGroup);

const rainMesh = new THREE.InstancedMesh(unitBox, rainMat, MAX_RAIN);
rainMesh.count = 0; rainMesh.frustumCulled = false;
rainGroup.add(rainMesh);

const snowMesh = new THREE.InstancedMesh(unitBox, snowMat, MAX_SNOW);
snowMesh.count = 0; snowMesh.frustumCulled = false;
snowGroup.add(snowMesh);

const rainData = [];
const snowData = [];

function setupPrecipitation(type, cfg) {
  rainData.length = 0;
  snowData.length = 0;
  if (!cfg) { rainMesh.count = 0; snowMesh.count = 0; return; }

  if (type === 'rain') {
    rainMat.opacity = cfg.opacity;
    const count = Math.min(cfg.count, MAX_RAIN);
    for (let i = 0; i < count; i++) {
      rainData.push({
        y: Math.random() * 20,
        ox: (Math.random() - 0.5) * cfg.spread,
        oz: (Math.random() - 0.5) * cfg.spread,
        speed: cfg.speed * (0.8 + Math.random() * 0.4),
        len: cfg.dropLen * (0.7 + Math.random() * 0.6),
        w: cfg.dropW * (0.7 + Math.random() * 0.6),
        spread: cfg.spread,
      });
    }
    rainMesh.count = count;
    snowMesh.count = 0;
  } else if (type === 'snow') {
    snowMat.opacity = cfg.opacity;
    const count = Math.min(cfg.count, MAX_SNOW);
    for (let i = 0; i < count; i++) {
      snowData.push({
        y: Math.random() * 20,
        ox: (Math.random() - 0.5) * cfg.spread,
        oz: (Math.random() - 0.5) * cfg.spread,
        speed: cfg.speed * (0.6 + Math.random() * 0.8),
        drift: Math.random() * Math.PI * 2,
        size: cfg.flakeSize * (0.6 + Math.random() * 0.8),
        spread: cfg.spread,
      });
    }
    snowMesh.count = count;
    rainMesh.count = 0;
  }
}

// ══════════════════════════════════════════════════════════════
//  Apply weather + time
// ══════════════════════════════════════════════════════════════
function applyWeather() {
  // weather.hour is set by manual controls
  const tp = getTimePreset(weather.hour);

  const cc = weather.code;
  const isOvercast = cc >= 3 && cc < 50;
  const isDrizzle = cc >= 51 && cc <= 57;
  const isRain = (cc >= 61 && cc <= 67) || (cc >= 80 && cc <= 82) || cc >= 95;
  const isSnow = (cc >= 71 && cc <= 77) || (cc >= 85 && cc <= 86);

  let skyColor = tp.sky, fogColor = tp.fog, sunIntensity = tp.sunI, exposure = tp.exposure;

  if (isRain || cc >= 95) {
    const heaviness = cc >= 95 ? 0.8 : cc >= 65 ? 0.7 : cc >= 63 ? 0.55 : 0.4;
    const base = new THREE.Color(tp.sky).lerp(new THREE.Color(0x666666), heaviness);
    skyColor = base.getHex(); fogColor = skyColor;
    sunIntensity *= (1 - heaviness * 0.7); exposure *= (1 - heaviness * 0.2);
  } else if (isDrizzle) {
    const base = new THREE.Color(tp.sky).lerp(new THREE.Color(0x888888), 0.3);
    skyColor = base.getHex(); fogColor = skyColor; sunIntensity *= 0.7;
  } else if (isOvercast) {
    const base = new THREE.Color(tp.sky).lerp(new THREE.Color(0x999999), 0.4);
    skyColor = base.getHex(); fogColor = skyColor; sunIntensity *= 0.6;
  }
  if (isSnow) {
    const heaviness = cc >= 75 ? 0.6 : cc >= 73 ? 0.4 : 0.25;
    const base = new THREE.Color(tp.sky).lerp(new THREE.Color(0xccccdd), heaviness);
    skyColor = base.getHex(); fogColor = skyColor;
    sunIntensity *= (1 - heaviness * 0.5); exposure *= (1 - heaviness * 0.15);
  }

  scene.background.setHex(skyColor);
  scene.fog.color.setHex(fogColor);
  ambientLight.color.setHex(tp.ambient); ambientLight.intensity = tp.ambientI;
  hemiLight.color.setHex(tp.hemiSky); hemiLight.groundColor.setHex(tp.hemiGround); hemiLight.intensity = tp.hemiI;
  sun.color.setHex(tp.sunColor); sun.intensity = sunIntensity;
  sun.shadow.intensity = tp.shadowI;
  renderer.toneMappingExposure = exposure;

  const h = weather.hour;
  const lampGlow = (h >= 19 || h < 6) ? 1.5 : (h >= 17 || h < 7) ? 0.6 : 0.15;
  lampMat.emissiveIntensity = lampGlow;
  lampLightIntensity = (h >= 19 || h < 6) ? 3.0 : (h >= 17 || h < 7) ? 1.0 : 0;

  // Precipitation — graduated stages
  const c = weather.code;
  if (c >= 95)          setupPrecipitation('rain', { count: 800, dropLen: 0.5, dropW: 0.05, speed: 22, opacity: 0.8, spread: 70 });
  else if (c === 65 || c === 82) setupPrecipitation('rain', { count: 600, dropLen: 0.45, dropW: 0.045, speed: 20, opacity: 0.7, spread: 70 });
  else if (c === 63 || c === 81) setupPrecipitation('rain', { count: 350, dropLen: 0.35, dropW: 0.035, speed: 16, opacity: 0.6, spread: 65 });
  else if (c === 61 || c === 80) setupPrecipitation('rain', { count: 180, dropLen: 0.25, dropW: 0.03, speed: 13, opacity: 0.5, spread: 60 });
  else if (c === 55 || c === 57) setupPrecipitation('rain', { count: 120, dropLen: 0.15, dropW: 0.02, speed: 8, opacity: 0.4, spread: 55 });
  else if (c === 53)             setupPrecipitation('rain', { count: 70, dropLen: 0.12, dropW: 0.015, speed: 6, opacity: 0.35, spread: 50 });
  else if (c === 51)             setupPrecipitation('rain', { count: 35, dropLen: 0.1, dropW: 0.012, speed: 4, opacity: 0.3, spread: 45 });
  else if (c === 75 || c === 86) setupPrecipitation('snow', { count: 500, flakeSize: 0.12, speed: 2.5, opacity: 0.95, spread: 70 });
  else if (c === 73 || c === 85) setupPrecipitation('snow', { count: 250, flakeSize: 0.09, speed: 1.8, opacity: 0.85, spread: 60 });
  else if (c === 71)             setupPrecipitation('snow', { count: 80, flakeSize: 0.06, speed: 1.0, opacity: 0.7, spread: 50 });
  else                           setupPrecipitation('none', null);
}

// ══════════════════════════════════════════════════════════════
//  Weather panel controls (manual only)
// ══════════════════════════════════════════════════════════════
function applyManualWeather() {
  const hour = parseInt(document.getElementById('sl-hour').value);
  const code = parseInt(document.getElementById('sel-weather').value);
  const wind = parseInt(document.getElementById('sl-wind').value);
  weather.hour = hour; weather.code = code; weather.windSpeed = wind;
  weather.isDay = hour >= 6 && hour < 20 ? 1 : 0;
  document.getElementById('v-hour').textContent = hour + 'h';
  document.getElementById('v-wind').textContent = wind;
  applyWeather();
}

document.getElementById('sl-hour').addEventListener('input', applyManualWeather);
document.getElementById('sel-weather').addEventListener('change', applyManualWeather);
document.getElementById('sl-wind').addEventListener('input', applyManualWeather);
applyManualWeather();

// ══════════════════════════════════════════════════════════════
//  Track path
// ══════════════════════════════════════════════════════════════
const TRACK_WIDTH = 8;

function createTrackPath() {
  const pts = [];
  const numEdges = 6;
  const baseR = 120;
  const cornerRound = 0.18;
  const corners = [];
  for (let i = 0; i < numEdges; i++) {
    const angle = (i / numEdges) * Math.PI * 2;
    const r = baseR * (0.85 + Math.random() * 0.3);
    corners.push(new THREE.Vector3(r * Math.sin(angle), 0, r * Math.cos(angle)));
  }
  for (let i = 0; i < numEdges; i++) {
    const curr = corners[i], next = corners[(i+1)%numEdges], next2 = corners[(i+2)%numEdges];
    const nStraight = 5;
    for (let j = 0; j <= nStraight; j++) {
      const t = cornerRound + (1 - 2*cornerRound) * j / nStraight;
      pts.push(new THREE.Vector3(curr.x + (next.x-curr.x)*t, 0, curr.z + (next.z-curr.z)*t));
    }
    const arcP0x = curr.x + (next.x-curr.x)*(1-cornerRound);
    const arcP0z = curr.z + (next.z-curr.z)*(1-cornerRound);
    const arcP2x = next.x + (next2.x-next.x)*cornerRound;
    const arcP2z = next.z + (next2.z-next.z)*cornerRound;
    const nArc = 5;
    for (let j = 1; j <= nArc; j++) {
      const t = j / (nArc+1), t1 = 1-t;
      pts.push(new THREE.Vector3(t1*t1*arcP0x + 2*t1*t*next.x + t*t*arcP2x, 0, t1*t1*arcP0z + 2*t1*t*next.z + t*t*arcP2z));
    }
  }
  return new THREE.CatmullRomCurve3(pts, true, 'catmullrom', 0.5);
}

const trackPath = createTrackPath();
const trackLength = trackPath.getLength();

// ── Ground ──
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1200, 1200),
  new THREE.MeshStandardMaterial({ color: 0x4a7c3f, roughness: 0.95 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ── Track surface ──
function buildTrack() {
  const segs = 600;
  const pos = [], nrm = [], uv = [], idx = [];
  for (let i = 0; i <= segs; i++) {
    const t = i / segs;
    const p = trackPath.getPointAt(t);
    const tan = trackPath.getTangentAt(t).normalize();
    const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0,1,0)).normalize();
    const hw = TRACK_WIDTH * 0.5;
    pos.push(p.x - right.x*hw, 0.02, p.z - right.z*hw);
    pos.push(p.x + right.x*hw, 0.02, p.z + right.z*hw);
    nrm.push(0,1,0, 0,1,0);
    uv.push(0, t*60, 1, t*60);
    if (i < segs) { const b = i*2; idx.push(b, b+1, b+2, b+1, b+3, b+2); }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(nrm, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  geo.setIndex(idx);
  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x444450, roughness: 0.8 }));
  mesh.receiveShadow = true;
  return mesh;
}
scene.add(buildTrack());

// ── Track helpers ──
const _trackSamples = [];
for (let i = 0; i < 400; i++) { const p = trackPath.getPointAt(i/400); _trackSamples.push(p.x, p.z); }

function isOnTrack(x, z, margin = 2) {
  const limitSq = (TRACK_WIDTH*0.5 + margin) ** 2;
  for (let i = 0; i < _trackSamples.length; i += 2) {
    const dx = x - _trackSamples[i], dz = z - _trackSamples[i+1];
    if (dx*dx + dz*dz < limitSq) return true;
  }
  return false;
}

function randomTrackSide(minDist, maxDist) {
  const t = Math.random();
  const p = trackPath.getPointAt(t);
  const tan = trackPath.getTangentAt(t).normalize();
  const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0,1,0)).normalize();
  const side = Math.random() > 0.5 ? 1 : -1;
  const dist = minDist + Math.random() * (maxDist - minDist);
  return { x: p.x + right.x*side*dist, z: p.z + right.z*side*dist, angle: Math.atan2(tan.x, tan.z) };
}

function nearestTrackAngle(x, z) {
  let minD = Infinity, bestI = 0;
  for (let i = 0; i < _trackSamples.length; i += 2) {
    const dx = x - _trackSamples[i], dz = z - _trackSamples[i+1];
    const d = dx*dx + dz*dz;
    if (d < minD) { minD = d; bestI = i/2; }
  }
  const tan = trackPath.getTangentAt(bestI / (_trackSamples.length/2));
  return Math.atan2(tan.x, tan.z);
}

// ══════════════════════════════════════════════════════════════
//  STATIC INSTANCED OBJECTS
// ══════════════════════════════════════════════════════════════

// ── Vegetation ──
{
  // Trees (1500)
  const treeMat = new THREE.MeshStandardMaterial({ color: 0x1a6b1a, roughness: 0.85 });
  const trees = [];
  for (let i = 0; i < 600; i++) {
    const { x, z } = randomTrackSide(TRACK_WIDTH*0.55+1, TRACK_WIDTH*0.55+20);
    if (isOnTrack(x, z)) continue;
    const h = 6+Math.random()*14, w = 2+Math.random()*4, d = 2+Math.random()*4;
    trees.push({ x, y: h/2, z, sx: w, sy: h, sz: d, ry: Math.random()*Math.PI });
  }
  for (let i = 0; i < 400; i++) {
    const { x, z } = randomTrackSide(TRACK_WIDTH*0.55+15, TRACK_WIDTH*0.55+50);
    if (isOnTrack(x, z)) continue;
    const h = 10+Math.random()*14, w = 3+Math.random()*5;
    trees.push({ x, y: h/2, z, sx: w, sy: h, sz: w, ry: Math.random()*Math.PI });
  }
  for (let i = 0; i < 500; i++) {
    const a = Math.random()*Math.PI*2, dist = 20+Math.random()*200;
    const x = dist*Math.sin(a), z = dist*Math.cos(a);
    if (isOnTrack(x, z, 3)) continue;
    const h = 8+Math.random()*16, w = 2+Math.random()*4;
    trees.push({ x, y: h/2, z, sx: w, sy: h, sz: w, ry: Math.random()*Math.PI });
  }
  addInst(inst(treeMat, trees, { shadow: true, recv: true }));

  // Bushes (250)
  const bushMat = new THREE.MeshStandardMaterial({ color: 0x8db600, roughness: 0.9 });
  const bushes = [];
  for (let i = 0; i < 250; i++) {
    const { x, z } = randomTrackSide(TRACK_WIDTH*0.55+0.5, TRACK_WIDTH*0.55+15);
    if (isOnTrack(x, z, 1)) continue;
    const h = 0.3+Math.random()*0.7, w = 0.5+Math.random()*1.5, d = 0.5+Math.random()*1.5;
    bushes.push({ x, y: h/2, z, sx: w, sy: h, sz: d, ry: Math.random()*Math.PI });
  }

// ── State ──
let playerT = 0;
const PLAYER_SPEED = 12;

// ── Camera ──
const CAM_DIST = 4.5, CAM_HEIGHT = 2.0, CAM_LERP = 0.045;
const camPos = new THREE.Vector3();
const camTgt = new THREE.Vector3();
let camReady = false;

// ══════════════════════════════════════════════════════════════
//  Animate loop
// ══════════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();

  // Player movement
  const speedMs = PLAYER_SPEED / 3.6;
  playerT = (playerT + speedMs * dt / trackLength) % 1;

  const pp = trackPath.getPointAt(playerT);
  const pt = trackPath.getTangentAt(playerT).normalize();

  const lookAheadT = (playerT + 20 / trackLength) % 1;
  const lookPt = trackPath.getPointAt(lookAheadT);
  const lookDir = new THREE.Vector3(lookPt.x - pp.x, 0, lookPt.z - pp.z).normalize();

  const bob = Math.abs(Math.sin(time * 9)) * 0.06;
  player.position.set(pp.x, 0.8 + bob, pp.z);
  player.lookAt(pp.x + lookDir.x, 0.8, pp.z + lookDir.z);

  // AI runners
  for (const ai of aiRunners) {
    const spd = ai.baseSpeed + Math.sin(time * ai.varFreq + ai.phase) * ai.speedVar;
    ai.t = (ai.t + Math.max(0, spd) / 3.6 * dt / trackLength) % 1;
    const ap = trackPath.getPointAt(ai.t);
    const aiLookT = (ai.t + 20 / trackLength) % 1;
    const aiLookPt = trackPath.getPointAt(aiLookT);
    const aiLookDir = new THREE.Vector3(aiLookPt.x - ap.x, 0, aiLookPt.z - ap.z).normalize();
    const right = new THREE.Vector3().crossVectors(aiLookDir, new THREE.Vector3(0,1,0)).normalize();
    const aiBob = Math.abs(Math.sin(time * 8 + ai.phase)) * 0.06;
    const aiX = ap.x + right.x * ai.lane, aiZ = ap.z + right.z * ai.lane;
    ai.mesh.position.set(aiX, 0.8 + aiBob, aiZ);
    ai.mesh.lookAt(aiX + aiLookDir.x, 0.8, aiZ + aiLookDir.z);
  }

  // Camera
  const desPos = new THREE.Vector3(pp.x - lookDir.x*CAM_DIST, CAM_HEIGHT, pp.z - lookDir.z*CAM_DIST);
  const desTgt = new THREE.Vector3(pp.x, 0.9, pp.z);
  if (!camReady) { camPos.copy(desPos); camTgt.copy(desTgt); camReady = true; }
  else { camPos.lerp(desPos, CAM_LERP); camTgt.lerp(desTgt, CAM_LERP); }
  camera.position.copy(camPos);
  camera.lookAt(camTgt);

  // Sun follows player
  sun.position.set(pp.x + 80, 100, pp.z + 60);
  sun.target.position.copy(pp);

  // Lamp PointLights: find nearest without allocating arrays
  if (lampLightIntensity > 0 && lampPositions.length > 0) {
    const nearest = [Infinity, Infinity, Infinity, Infinity];
    const nearestIdx = [0, 0, 0, 0];
    for (let i = 0; i < lampPositions.length; i++) {
      const lp = lampPositions[i];
      const d = (lp.x - pp.x) ** 2 + (lp.z - pp.z) ** 2;
      for (let j = 0; j < LAMP_LIGHT_COUNT; j++) {
        if (d < nearest[j]) {
          for (let k = LAMP_LIGHT_COUNT - 1; k > j; k--) { nearest[k] = nearest[k-1]; nearestIdx[k] = nearestIdx[k-1]; }
          nearest[j] = d; nearestIdx[j] = i; break;
        }
      }
    }
    for (let i = 0; i < LAMP_LIGHT_COUNT; i++) {
      lampLights[i].position.copy(lampPositions[nearestIdx[i]]);
      lampLights[i].intensity = lampLightIntensity;
    }
  } else {
    for (const ll of lampLights) ll.intensity = 0;
  }

  // Wind (always screen-right)
  const windMul = Math.max(0.3, weather.windSpeed / 10);
  const camRight = new THREE.Vector3().crossVectors(lookDir, new THREE.Vector3(0,1,0)).normalize();
  const wdX = camRight.x * windMul, wdZ = camRight.z * windMul;

  // ── Update animated instances ──

  // Clouds
  if (cloudMesh) {
    for (let i = 0; i < cloudData.length; i++) {
      const c = cloudData[i];
      c.x += (Math.sin(c.dir) * c.speed * 0.3 + wdX * 2) * dt;
      c.z += (Math.cos(c.dir) * c.speed * 0.3 + wdZ * 2) * dt;
      _d.position.set(c.x, c.y, c.z);
      _d.scale.set(15 + i * 0.6, 2 + (i % 5) * 0.4, 8 + (i % 7) * 1.2); // approximate original sizes
      _d.rotation.set(0, i * 0.5, 0);
      _d.updateMatrix();
      cloudMesh.setMatrixAt(i, _d.matrix);
    }
    cloudMesh.instanceMatrix.needsUpdate = true;
  }

  // Birds
  if (birdMesh) {
    for (let i = 0; i < birdData.length; i++) {
      const b = birdData[i];
      const t2 = time * b.speed * 0.1 + b.phase;
      const bx = b.cx + b.ox + Math.sin(t2 + b.dir) * 8;
      const bz = b.cz + b.oz + Math.cos(t2 + b.dir) * 8;
      const by = b.cy + b.oy + Math.sin(time * 2 + b.phase) * 0.5;
      _d.position.set(bx, by, bz);
      _d.scale.set(0.3, 0.1, 0.15);
      _d.rotation.set(0, t2 + b.dir, 0);
      _d.updateMatrix();
      birdMesh.setMatrixAt(i, _d.matrix);
    }
    birdMesh.instanceMatrix.needsUpdate = true;
  }

  // Particles (follow player)
  particleGroup.position.set(pp.x, 0, pp.z);
  for (const p of particleData) {
    const m = particleMeshes[p.type];
    if (!m) continue;
    const t2 = time * p.driftSpeed * windMul + p.phase;
    const px = p.offsetX + Math.sin(t2) * 4 * windMul + wdX * 3 * Math.sin(time * 0.5 + p.phase);
    const py = p.offsetY + Math.sin(time * p.bobSpeed + p.phase) * p.bobAmp;
    const pz = p.offsetZ + Math.cos(t2 * 0.7) * 4 * windMul + wdZ * 3 * Math.sin(time * 0.5 + p.phase);
    _d.position.set(px, py, pz);
    _d.rotation.set(time * p.spinSpeed * 0.5 * windMul, time * p.spinSpeed * windMul, 0);
    // Reuse original scale from creation
    const sz = p.type === 0 ? 0.08 : p.type === 1 ? 0.04 : 0.03;
    const s = sz + sz * (p.phase / Math.PI); // deterministic variation
    _d.scale.set(s, s * 0.3, s);
    _d.updateMatrix();
    m.setMatrixAt(p.idx, _d.matrix);
  }
  for (const m of particleMeshes) { if (m) m.instanceMatrix.needsUpdate = true; }

  // Rain — compute tilt once, apply to all drops
  rainGroup.position.set(pp.x, 0, pp.z);
  if (rainData.length > 0) {
    const rainDriftX = wdX * 0.3, rainDriftZ = wdZ * 0.3;
    // Compute shared rain orientation (all drops tilt same direction)
    _d.position.set(0, 10, 0);
    _d.lookAt(rainDriftX * 10, 10 - 10, rainDriftZ * 10);
    const rqx = _d.quaternion.x, rqy = _d.quaternion.y, rqz = _d.quaternion.z, rqw = _d.quaternion.w;

    for (let i = 0; i < rainData.length; i++) {
      const r = rainData[i];
      r.y -= r.speed * dt;
      r.ox += rainDriftX * r.speed * dt;
      r.oz += rainDriftZ * r.speed * dt;
      if (r.y < 0) {
        r.y = 17 + Math.random() * 5;
        r.ox = (Math.random() - 0.5) * 65;
        r.oz = (Math.random() - 0.5) * 65;
      }
      _d.position.set(r.ox, r.y, r.oz);
      _d.quaternion.set(rqx, rqy, rqz, rqw);
      _d.scale.set(r.w, r.len, r.w);
      _d.updateMatrix();
      rainMesh.setMatrixAt(i, _d.matrix);
    }
    rainMesh.instanceMatrix.needsUpdate = true;
  }

  // Snow
  snowGroup.position.set(pp.x, 0, pp.z);
  if (snowData.length > 0) {
    for (let i = 0; i < snowData.length; i++) {
      const s = snowData[i];
      s.y -= s.speed * dt;
      s.ox += wdX * s.speed * 0.5 * dt;
      s.oz += wdZ * s.speed * 0.5 * dt;
      if (s.y < 0) {
        s.y = 15 + Math.random() * 5;
        s.ox = (Math.random() - 0.5) * 60;
        s.oz = (Math.random() - 0.5) * 60;
      }
      const sx = s.ox + Math.sin(time * 0.5 + s.drift) * 3;
      const sz = s.oz + Math.cos(time * 0.3 + s.drift) * 3;
      _d.position.set(sx, s.y, sz);
      _d.rotation.set(time * 0.3 + s.drift, time * 0.5, 0);
      _d.scale.set(s.size, s.size, s.size);
      _d.updateMatrix();
      snowMesh.setMatrixAt(i, _d.matrix);
    }
    snowMesh.instanceMatrix.needsUpdate = true;
  }

  renderer.render(scene, camera);
}

// ── Resize ──
window.addEventListener('resize', () => {
  const { w, h } = calcSize();
  renderer.setSize(w, h);
});

// ── Start ──
const sp = trackPath.getPointAt(0);
const st = trackPath.getTangentAt(0).normalize();
camera.position.set(sp.x - st.x * CAM_DIST, CAM_HEIGHT, sp.z - st.z * CAM_DIST);
camera.lookAt(sp);
animate();
</script>
</body>
</html>
