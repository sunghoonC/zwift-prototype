<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZwiftBox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; }
  canvas { display: block; }
  #weather-panel {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    background: rgba(0,0,0,0.75); color: #fff; padding: 12px 14px;
    border-radius: 10px; font: 12px/1.6 -apple-system, sans-serif;
    min-width: 180px; backdrop-filter: blur(6px);
  }
  #weather-panel.collapsed > *:not(.panel-header) { display: none; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; margin-bottom: 6px; }
  .panel-header h3 { font-size: 12px; margin: 0; }
  .panel-header span { font-size: 16px; }
  #weather-panel label { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; }
  #weather-panel label span:first-child { opacity: 0.7; }
  #weather-panel input[type=range] { width: 90px; height: 4px; accent-color: #4af; }
  #weather-panel select { background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 2px 4px; font-size: 11px; }
  #weather-panel .val { min-width: 28px; text-align: right; font-variant-numeric: tabular-nums; }
  #weather-panel .divider { border-top: 1px solid rgba(255,255,255,0.15); margin: 6px 0; }
  #weather-panel .mode-toggle { display: flex; gap: 4px; margin-bottom: 6px; }
  #weather-panel .mode-toggle button { flex: 1; background: #333; color: #aaa; border: 1px solid #555; border-radius: 4px; padding: 3px 0; font-size: 11px; cursor: pointer; }
  #weather-panel .mode-toggle button.active { background: #4af; color: #000; border-color: #4af; }
</style>
</head>
<body>

<div id="weather-panel">
  <div class="panel-header" onclick="this.parentElement.classList.toggle('collapsed')">
    <h3>Weather Control</h3><span>▾</span>
  </div>
  <div class="mode-toggle">
    <button id="btn-auto" class="active" onclick="window.setWeatherMode('auto')">실시간</button>
    <button id="btn-manual" onclick="window.setWeatherMode('manual')">수동</button>
  </div>
  <div id="manual-controls" style="display:none">
    <label><span>시간</span><input type="range" id="sl-hour" min="0" max="23" value="12"><span class="val" id="v-hour">12h</span></label>
    <label><span>날씨</span>
      <select id="sel-weather">
        <option value="0">맑음</option>
        <option value="2">구름 조금</option>
        <option value="3">흐림</option>
        <option value="45">안개</option>
        <option value="51">이슬비</option>
        <option value="53">가랑비</option>
        <option value="55">보슬비</option>
        <option value="61">비</option>
        <option value="63">큰비</option>
        <option value="65">폭우</option>
        <option value="71">싸락눈</option>
        <option value="73">눈</option>
        <option value="75">폭설</option>
        <option value="95">뇌우</option>
      </select>
    </label>
    <div class="divider"></div>
    <label><span>풍속</span><input type="range" id="sl-wind" min="0" max="50" value="3"><span class="val" id="v-wind">3</span></label>
  </div>
  <div id="auto-info">
    <div class="divider"></div>
    <div id="weather-status" style="opacity:0.7;font-size:11px">날씨 불러오는 중...</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ── Fixed 9:16 portrait aspect ratio ──
const ASPECT = 9 / 16;

function calcSize() {
  const ww = window.innerWidth;
  const wh = window.innerHeight;
  let w, h;
  if (ww / wh > ASPECT) {
    h = wh;
    w = Math.floor(h * ASPECT);
  } else {
    w = ww;
    h = Math.floor(w / ASPECT);
  }
  return { w, h };
}

const { w: initW, h: initH } = calcSize();

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(initW, initH);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.VSMShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.6;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 100, 200);

const camera = new THREE.PerspectiveCamera(55, ASPECT, 0.5, 500);
const clock = new THREE.Clock();

// ── Weather state (updated from API) ──
let weatherMode = 'auto';
const weather = {
  windSpeed: 3, windDir: 0, code: 0, isDay: 1,
  temp: 15, hour: new Date().getHours(),
};

// Fetch real weather (Open-Meteo, no API key needed)
async function fetchWeatherData() {
  try {
    const pos = await new Promise((res) => {
      navigator.geolocation
        ? navigator.geolocation.getCurrentPosition(
            p => res({ lat: p.coords.latitude, lon: p.coords.longitude }),
            () => res({ lat: 37.5665, lon: 126.978 }), { timeout: 3000 })
        : res({ lat: 37.5665, lon: 126.978 });
    });
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${pos.lat}&longitude=${pos.lon}&current=temperature_2m,wind_speed_10m,wind_direction_10m,weather_code,is_day`;
    const r = await fetch(url);
    const d = await r.json();
    const c = d.current;
    weather.windSpeed = c.wind_speed_10m;
    weather.windDir = (c.wind_direction_10m * Math.PI) / 180;
    weather.code = c.weather_code;
    weather.isDay = c.is_day;
    weather.temp = c.temperature_2m;
    applyWeather();
    updateWeatherStatus();
  } catch (e) { console.warn('Weather fetch failed, using defaults'); applyWeather(); }
}
// Don't block init — fire and forget
fetchWeatherData();
setInterval(() => { if (weatherMode === 'auto') fetchWeatherData(); }, 600000);

// ── Time-of-day presets ──
function getTimePreset(hour) {
  // All presets keep high enough ambient + exposure so objects remain clearly visible
  if (hour >= 21 || hour < 5)   return { sky: 0x0f1535, fog: 0x0f1535, ambient: 0x4466aa, ambientI: 0.7, hemiSky: 0x223355, hemiGround: 0x222233, hemiI: 0.5, sunColor: 0x8899cc, sunI: 0.5, exposure: 1.3, shadowI: 0.1 };
  if (hour >= 5 && hour < 7)    return { sky: 0xff8844, fog: 0xdd7744, ambient: 0xcc8866, ambientI: 0.7, hemiSky: 0xff9955, hemiGround: 0x554433, hemiI: 0.6, sunColor: 0xffaa55, sunI: 0.9, exposure: 1.4, shadowI: 0.2 };
  if (hour >= 7 && hour < 10)   return { sky: 0x99ccee, fog: 0x99ccee, ambient: 0x99aabb, ambientI: 0.7, hemiSky: 0x99ccee, hemiGround: 0x556633, hemiI: 0.6, sunColor: 0xfff0d0, sunI: 1.2, exposure: 1.5, shadowI: 0.25 };
  if (hour >= 10 && hour < 16)  return { sky: 0x87CEEB, fog: 0x87CEEB, ambient: 0x8899bb, ambientI: 0.8, hemiSky: 0x87CEEB, hemiGround: 0x556633, hemiI: 0.7, sunColor: 0xfff4e0, sunI: 1.4, exposure: 1.6, shadowI: 0.3 };
  if (hour >= 16 && hour < 19)  return { sky: 0xdd8855, fog: 0xcc7744, ambient: 0xbb8866, ambientI: 0.7, hemiSky: 0xee8844, hemiGround: 0x554433, hemiI: 0.6, sunColor: 0xffaa44, sunI: 1.0, exposure: 1.4, shadowI: 0.2 };
  /* 19-21 */                    return { sky: 0x1a2744, fog: 0x1a2744, ambient: 0x556688, ambientI: 0.6, hemiSky: 0x334466, hemiGround: 0x333333, hemiI: 0.5, sunColor: 0x9999bb, sunI: 0.6, exposure: 1.3, shadowI: 0.15 };
}

// ── Lighting (dynamic references) ──
const ambientLight = new THREE.AmbientLight(0x8899bb, 0.8);
scene.add(ambientLight);
const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556633, 0.7);
scene.add(hemiLight);

const sun = new THREE.DirectionalLight(0xfff4e0, 1.4);
sun.position.set(80, 100, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -60;
sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60;
sun.shadow.camera.bottom = -60;
sun.shadow.camera.near = 10;
sun.shadow.camera.far = 300;
sun.shadow.radius = 8;
sun.shadow.blurSamples = 16;
sun.shadow.intensity = 0.3;
sun.shadow.bias = -0.0005;
scene.add(sun);
scene.add(sun.target);

// ── Street lamp material (shared, updated by applyWeather) ──
const lampMat = new THREE.MeshStandardMaterial({ color: 0xffeecc, emissive: 0xffeecc, emissiveIntensity: 0.3 });
let lampLightIntensity = 0;

// ── Rain/Snow particle systems ──
const rainDrops = [];
const snowFlakes = [];
const rainGroup = new THREE.Group();
const snowGroup = new THREE.Group();
scene.add(rainGroup);
scene.add(snowGroup);

// intensity: { count, dropLen, dropW, speed, opacity, spread }
function setupPrecipitation(type, cfg) {
  rainGroup.clear(); rainDrops.length = 0;
  snowGroup.clear(); snowFlakes.length = 0;
  if (!cfg) return;
  const { count, spread } = cfg;
  if (type === 'rain') {
    const mat = new THREE.MeshBasicMaterial({ color: 0xaaccff, transparent: true, opacity: cfg.opacity });
    for (let i = 0; i < count; i++) {
      const len = cfg.dropLen * (0.7 + Math.random() * 0.6);
      const w = cfg.dropW * (0.7 + Math.random() * 0.6);
      const drop = new THREE.Mesh(new THREE.BoxGeometry(w, len, w), mat);
      drop.position.set((Math.random() - 0.5) * spread, Math.random() * 20, (Math.random() - 0.5) * spread);
      rainGroup.add(drop);
      rainDrops.push({ mesh: drop, speed: cfg.speed * (0.8 + Math.random() * 0.4), ox: (Math.random() - 0.5) * spread, oz: (Math.random() - 0.5) * spread });
    }
  } else if (type === 'snow') {
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: cfg.opacity });
    for (let i = 0; i < count; i++) {
      const s = cfg.flakeSize * (0.6 + Math.random() * 0.8);
      const flake = new THREE.Mesh(new THREE.BoxGeometry(s, s, s), mat);
      flake.position.set((Math.random() - 0.5) * spread, Math.random() * 20, (Math.random() - 0.5) * spread);
      snowGroup.add(flake);
      snowFlakes.push({ mesh: flake, speed: cfg.speed * (0.6 + Math.random() * 0.8), drift: Math.random() * Math.PI * 2, ox: (Math.random() - 0.5) * spread, oz: (Math.random() - 0.5) * spread });
    }
  }
}

// ── Apply weather + time to scene ──
function applyWeather() {
  if (weatherMode !== 'manual') weather.hour = new Date().getHours();
  const tp = getTimePreset(weather.hour);

  const cc = weather.code;
  const isOvercast = cc >= 3 && cc < 50;
  const isDrizzle = cc >= 51 && cc <= 57;
  const isRain = (cc >= 61 && cc <= 67) || (cc >= 80 && cc <= 82) || cc >= 95;
  const isSnow = (cc >= 71 && cc <= 77) || (cc >= 85 && cc <= 86);

  let skyColor = tp.sky;
  let fogColor = tp.fog;
  let sunIntensity = tp.sunI;
  let exposure = tp.exposure;

  // Graduated sky darkening based on precipitation intensity
  if (isRain || cc >= 95) {
    const heaviness = cc >= 95 ? 0.8 : cc >= 65 ? 0.7 : cc >= 63 ? 0.55 : 0.4;
    const gray = new THREE.Color(0x666666);
    const base = new THREE.Color(tp.sky);
    base.lerp(gray, heaviness);
    skyColor = base.getHex();
    fogColor = skyColor;
    sunIntensity *= (1 - heaviness * 0.7);
    exposure *= (1 - heaviness * 0.2);
  } else if (isDrizzle) {
    const gray = new THREE.Color(0x888888);
    const base = new THREE.Color(tp.sky);
    base.lerp(gray, 0.3);
    skyColor = base.getHex();
    fogColor = skyColor;
    sunIntensity *= 0.7;
  } else if (isOvercast) {
    const gray = new THREE.Color(0x999999);
    const base = new THREE.Color(tp.sky);
    base.lerp(gray, 0.4);
    skyColor = base.getHex();
    fogColor = skyColor;
    sunIntensity *= 0.6;
  }
  if (isSnow) {
    const heaviness = cc >= 75 ? 0.6 : cc >= 73 ? 0.4 : 0.25;
    const sn = new THREE.Color(0xccccdd);
    const base = new THREE.Color(tp.sky);
    base.lerp(sn, heaviness);
    skyColor = base.getHex();
    fogColor = skyColor;
    sunIntensity *= (1 - heaviness * 0.5);
    exposure *= (1 - heaviness * 0.15);
  }

  scene.background.setHex(skyColor);
  scene.fog.color.setHex(fogColor);
  ambientLight.color.setHex(tp.ambient);
  ambientLight.intensity = tp.ambientI;
  hemiLight.color.setHex(tp.hemiSky);
  hemiLight.groundColor.setHex(tp.hemiGround);
  hemiLight.intensity = tp.hemiI;
  sun.color.setHex(tp.sunColor);
  sun.intensity = sunIntensity;
  sun.shadow.intensity = tp.shadowI;
  renderer.toneMappingExposure = exposure;

  // Street lamps: glow bright at night, dim during day
  const h = weather.hour;
  const lampGlow = (h >= 19 || h < 6) ? 1.5 : (h >= 17 || h < 7) ? 0.6 : 0.15;
  lampMat.emissiveIntensity = lampGlow;
  // PointLight intensity: strong at night, off during day
  lampLightIntensity = (h >= 19 || h < 6) ? 3.0 : (h >= 17 || h < 7) ? 1.0 : 0;

  // Precipitation — graduated stages
  const c = weather.code;
  if (c >= 95) {
    // Thunderstorm — extreme rain
    setupPrecipitation('rain', { count: 800, dropLen: 0.5, dropW: 0.05, speed: 22, opacity: 0.8, spread: 70 });
  } else if (c === 65 || c === 82) {
    // Heavy rain
    setupPrecipitation('rain', { count: 600, dropLen: 0.45, dropW: 0.045, speed: 20, opacity: 0.7, spread: 70 });
  } else if (c === 63 || c === 81) {
    // Moderate rain
    setupPrecipitation('rain', { count: 350, dropLen: 0.35, dropW: 0.035, speed: 16, opacity: 0.6, spread: 65 });
  } else if (c === 61 || c === 80) {
    // Light rain
    setupPrecipitation('rain', { count: 180, dropLen: 0.25, dropW: 0.03, speed: 13, opacity: 0.5, spread: 60 });
  } else if (c === 55 || c === 57) {
    // Dense drizzle
    setupPrecipitation('rain', { count: 120, dropLen: 0.15, dropW: 0.02, speed: 8, opacity: 0.4, spread: 55 });
  } else if (c === 53) {
    // Moderate drizzle
    setupPrecipitation('rain', { count: 70, dropLen: 0.12, dropW: 0.015, speed: 6, opacity: 0.35, spread: 50 });
  } else if (c === 51) {
    // Light drizzle
    setupPrecipitation('rain', { count: 35, dropLen: 0.1, dropW: 0.012, speed: 4, opacity: 0.3, spread: 45 });
  } else if (c === 75 || c === 86) {
    // Heavy snow
    setupPrecipitation('snow', { count: 500, flakeSize: 0.12, speed: 2.5, opacity: 0.95, spread: 70 });
  } else if (c === 73 || c === 85) {
    // Moderate snow
    setupPrecipitation('snow', { count: 250, flakeSize: 0.09, speed: 1.8, opacity: 0.85, spread: 60 });
  } else if (c === 71) {
    // Light snow
    setupPrecipitation('snow', { count: 80, flakeSize: 0.06, speed: 1.0, opacity: 0.7, spread: 50 });
  } else {
    setupPrecipitation('none', null);
  }
}
applyWeather();

// ── Weather panel controls ──
const weatherLabels = { 0: '맑음', 2: '구름 조금', 3: '흐림', 45: '안개', 51: '이슬비', 53: '가랑비', 55: '보슬비', 61: '비', 63: '큰비', 65: '폭우', 71: '싸락눈', 73: '눈', 75: '폭설', 80: '소나기(약)', 81: '소나기', 82: '소나기(강)', 85: '눈보라(약)', 86: '눈보라', 95: '뇌우' };

function setWeatherMode(mode) {
  weatherMode = mode;
  document.getElementById('btn-auto').classList.toggle('active', mode === 'auto');
  document.getElementById('btn-manual').classList.toggle('active', mode === 'manual');
  document.getElementById('manual-controls').style.display = mode === 'manual' ? 'block' : 'none';
  document.getElementById('auto-info').style.display = mode === 'auto' ? 'block' : 'none';
  if (mode === 'auto') fetchWeatherData();
  else applyManualWeather();
}
window.setWeatherMode = setWeatherMode;

function applyManualWeather() {
  const hour = parseInt(document.getElementById('sl-hour').value);
  const code = parseInt(document.getElementById('sel-weather').value);
  const wind = parseInt(document.getElementById('sl-wind').value);
  weather.hour = hour;
  weather.code = code;
  weather.windSpeed = wind;
  weather.isDay = hour >= 6 && hour < 20 ? 1 : 0;
  document.getElementById('v-hour').textContent = hour + 'h';
  document.getElementById('v-wind').textContent = wind;
  applyWeather();
}

function updateWeatherStatus() {
  const codeText = weatherLabels[weather.code] || `코드${weather.code}`;
  document.getElementById('weather-status').textContent =
    `${weather.temp}°C · ${codeText} · 풍속 ${weather.windSpeed}km/h`;
}

document.getElementById('sl-hour').addEventListener('input', applyManualWeather);
document.getElementById('sel-weather').addEventListener('change', applyManualWeather);
document.getElementById('sl-wind').addEventListener('input', applyManualWeather);

// ── Track path (flat, y=0) ──
const TRACK_WIDTH = 8;

function createTrackPath() {
  const pts = [];
  const numEdges = 6;
  const baseR = 120;
  const cornerRound = 0.18; // fraction of each edge used for rounding at each end

  // Polygon corners with varied radius
  const corners = [];
  for (let i = 0; i < numEdges; i++) {
    const angle = (i / numEdges) * Math.PI * 2;
    const r = baseR * (0.85 + Math.random() * 0.3);
    corners.push(new THREE.Vector3(r * Math.sin(angle), 0, r * Math.cos(angle)));
  }

  for (let i = 0; i < numEdges; i++) {
    const curr = corners[i];
    const next = corners[(i + 1) % numEdges];
    const next2 = corners[(i + 2) % numEdges];

    // ── Straight section: collinear points along middle 64% of edge ──
    const nStraight = 5;
    for (let j = 0; j <= nStraight; j++) {
      const t = cornerRound + (1 - 2 * cornerRound) * j / nStraight;
      pts.push(new THREE.Vector3(
        curr.x + (next.x - curr.x) * t, 0,
        curr.z + (next.z - curr.z) * t
      ));
    }

    // ── Corner arc: quadratic Bezier for smooth rounded corner ──
    // Arc goes from (1-cornerRound) of this edge, through the corner vertex,
    // to cornerRound of the next edge — tangent-continuous with both edges
    const arcP0x = curr.x + (next.x - curr.x) * (1 - cornerRound);
    const arcP0z = curr.z + (next.z - curr.z) * (1 - cornerRound);
    const arcP2x = next.x + (next2.x - next.x) * cornerRound;
    const arcP2z = next.z + (next2.z - next.z) * cornerRound;

    const nArc = 5;
    for (let j = 1; j <= nArc; j++) {
      const t = j / (nArc + 1);
      const t1 = 1 - t;
      pts.push(new THREE.Vector3(
        t1 * t1 * arcP0x + 2 * t1 * t * next.x + t * t * arcP2x, 0,
        t1 * t1 * arcP0z + 2 * t1 * t * next.z + t * t * arcP2z
      ));
    }
  }

  return new THREE.CatmullRomCurve3(pts, true, 'catmullrom', 0.5);
}

const trackPath = createTrackPath();
const trackLength = trackPath.getLength();

// ── Ground ──
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1200, 1200),
  new THREE.MeshStandardMaterial({ color: 0x4a7c3f, roughness: 0.95 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// ── Track surface (ribbon on ground) ──
function buildTrack() {
  const segs = 600;
  const pos = [], nrm = [], uv = [], idx = [];

  for (let i = 0; i <= segs; i++) {
    const t = i / segs;
    const p = trackPath.getPointAt(t);
    const tan = trackPath.getTangentAt(t).normalize();
    const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0, 1, 0)).normalize();
    const hw = TRACK_WIDTH * 0.5;

    pos.push(p.x - right.x * hw, 0.02, p.z - right.z * hw);
    pos.push(p.x + right.x * hw, 0.02, p.z + right.z * hw);
    nrm.push(0, 1, 0, 0, 1, 0);
    uv.push(0, t * 60, 1, t * 60);

    if (i < segs) {
      const b = i * 2;
      idx.push(b, b + 1, b + 2, b + 1, b + 3, b + 2);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(nrm, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  geo.setIndex(idx);

  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x444450, roughness: 0.8 }));
  mesh.receiveShadow = true;
  return mesh;
}
scene.add(buildTrack());

// ── Track clearance check: is (x,z) too close to the track? ──
const _trackSamples = [];
for (let i = 0; i < 400; i++) {
  const p = trackPath.getPointAt(i / 400);
  _trackSamples.push(p.x, p.z);
}

function isOnTrack(x, z, margin = 2) {
  const limit = (TRACK_WIDTH * 0.5 + margin);
  const limitSq = limit * limit;
  for (let i = 0; i < _trackSamples.length; i += 2) {
    const dx = x - _trackSamples[i];
    const dz = z - _trackSamples[i + 1];
    if (dx * dx + dz * dz < limitSq) return true;
  }
  return false;
}

// ── Helper: place object along track side ──
function randomTrackSide(minDist, maxDist) {
  const t = Math.random();
  const p = trackPath.getPointAt(t);
  const tan = trackPath.getTangentAt(t).normalize();
  const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0, 1, 0)).normalize();
  const side = Math.random() > 0.5 ? 1 : -1;
  const dist = minDist + Math.random() * (maxDist - minDist);
  return {
    x: p.x + right.x * side * dist,
    z: p.z + right.z * side * dist,
    angle: Math.atan2(tan.x, tan.z),
  };
}

// ── Helper: find nearest track direction angle for a world position ──
function nearestTrackAngle(x, z) {
  let minD = Infinity, bestI = 0;
  for (let i = 0; i < _trackSamples.length; i += 2) {
    const dx = x - _trackSamples[i], dz = z - _trackSamples[i + 1];
    const d = dx * dx + dz * dz;
    if (d < minD) { minD = d; bestI = i / 2; }
  }
  const tan = trackPath.getTangentAt(bestI / (_trackSamples.length / 2));
  return Math.atan2(tan.x, tan.z);
}

// ── Buildings: dense, tall cubes to help block horizon ──
function placeBuildings() {

  // Near buildings — close to track, aligned parallel to track
  for (let i = 0; i < 100; i++) {

    const scale = 0.5 + Math.random() * 1.0;
    const w = scale * (4 + Math.random() * 4);
    const d = scale * (8 + Math.random() * 10);

    const halfW = w / 2, halfD = d / 2;
    if (isOnTrack(x - halfW, z - halfD, 3) || isOnTrack(x + halfW, z - halfD, 3) ||
        isOnTrack(x - halfW, z + halfD, 3) || isOnTrack(x + halfW, z + halfD, 3) ||
        isOnTrack(x, z, 3)) continue;
    const bld = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, d),
      buildingMat
    );
    bld.position.set(x, h / 2, z);
    bld.castShadow = true;
    bld.receiveShadow = true;
    bld.rotation.y = angle;
    group.add(bld);
  }

  // Background buildings — tall wall further out, aligned to track
  for (let i = 0; i < 80; i++) {
    const { x, z, angle } = randomTrackSide(TRACK_WIDTH * 0.55 + 25, TRACK_WIDTH * 0.55 + 70);
    if (isOnTrack(x, z, 3)) continue;

    const scale = 0.8 + Math.random() * 1.2;
    const w = scale * (5 + Math.random() * 5);
    const d = scale * (10 + Math.random() * 12);
    const h = scale * (14 + Math.random() * 16);
    const bld = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, d),
      buildingMat
    );
    bld.position.set(x, h / 2, z);
    bld.receiveShadow = true;
    bld.rotation.y = angle;
    group.add(bld);
  }

  // Area-fill buildings — aligned to nearest track direction
  for (let i = 0; i < 60; i++) {
    const a = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 190;
    const x = dist * Math.sin(a);
    const z = dist * Math.cos(a);
    if (isOnTrack(x, z, 5)) continue;

    const scale = 0.6 + Math.random() * 1.1;
    const w = scale * (4 + Math.random() * 5);
    const d = scale * (8 + Math.random() * 12);

      new THREE.BoxGeometry(w, h, d),
      buildingMat
    );
    bld.position.set(x, h / 2, z);
    bld.receiveShadow = true;
    bld.rotation.y = nearestTrackAngle(x, z);
    group.add(bld);
  }

  return group;
}

// ── Street poles: evenly spaced along track for speed perception ──
const lampPositions = []; // store all lamp world positions for PointLight pool
function placeStreetPoles() {
  const group = new THREE.Group();
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.6 });

  for (let i = 0; i < count; i++) {
    const t = i / count;
    const p = trackPath.getPointAt(t);
    const tan = trackPath.getTangentAt(t).normalize();
    const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0, 1, 0)).normalize();
    for (const side of [-1, 1]) {
      const px = p.x + right.x * side * (TRACK_WIDTH * 0.5 + 1.5);
      const pz = p.z + right.z * side * (TRACK_WIDTH * 0.5 + 1.5);

// ── Arches/gates: span across track at intervals ──
function placeArches() {
  const group = new THREE.Group();
  const archMat = new THREE.MeshStandardMaterial({ color: 0xdd4444, roughness: 0.5 });
  const spacing = 80;
  const count = Math.floor(trackLength / spacing);
  for (let i = 0; i < count; i++) {
    const t = i / count;
    const p = trackPath.getPointAt(t);
    const tan = trackPath.getTangentAt(t).normalize();
    const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0, 1, 0)).normalize();
    const angle = Math.atan2(tan.x, tan.z);
    const hw = TRACK_WIDTH * 0.5 + 1;
    const archH = 4.5;
    // Left pillar
    const lp = new THREE.Mesh(new THREE.BoxGeometry(0.4, archH, 0.4), archMat);
    lp.position.set(p.x - right.x * hw, archH / 2, p.z - right.z * hw);
    lp.rotation.y = angle;
    group.add(lp);
    // Right pillar
    const rp = new THREE.Mesh(new THREE.BoxGeometry(0.4, archH, 0.4), archMat);
    rp.position.set(p.x + right.x * hw, archH / 2, p.z + right.z * hw);
    rp.rotation.y = angle;
    group.add(rp);
    // Top beam
    const beam = new THREE.Mesh(new THREE.BoxGeometry(TRACK_WIDTH + 2, 0.5, 0.6), archMat);
    beam.position.set(p.x, archH + 0.25, p.z);
    beam.rotation.y = angle;
    group.add(beam);
  }
  return group;
}

// ── Spectators: small people cubes along the track ──
function placeSpectators() {
  const group = new THREE.Group();
  const specColors = [0x3366cc, 0xcc3333, 0xffcc00, 0x33aa55, 0xffffff, 0xff6699, 0x8844bb];
  const specMats = specColors.map(c => new THREE.MeshStandardMaterial({ color: c, roughness: 0.6 }));
  const clusters = 30;
  for (let c = 0; c < clusters; c++) {
    const t = Math.random();
    const p = trackPath.getPointAt(t);
    const tan = trackPath.getTangentAt(t).normalize();
    const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0, 1, 0)).normalize();
    const side = Math.random() > 0.5 ? 1 : -1;
    const groupDist = TRACK_WIDTH * 0.5 + 2 + Math.random() * 2;
    const clusterSize = 3 + Math.floor(Math.random() * 6);
    for (let j = 0; j < clusterSize; j++) {
      const offset = (j - clusterSize / 2) * 0.7;
      const sx = p.x + right.x * side * groupDist + tan.x * offset;
      const sz = p.z + right.z * side * groupDist + tan.z * offset;
      const h = 1.2 + Math.random() * 0.5;
      const spec = new THREE.Mesh(
        new THREE.BoxGeometry(0.35, h, 0.25),
        specMats[Math.floor(Math.random() * specMats.length)]
      );
      spec.position.set(sx, h / 2, sz);
      spec.lookAt(p.x, h / 2, p.z);
      group.add(spec);
    }
  }
  return group;
}
scene.add(placeSpectators());

// ── Tunnel: enclosed section of track ──
function placeTunnel() {
  const group = new THREE.Group();
  const tunnelMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
  const tunnelLen = 25;
  const tunnelT = 0.4;
  const segs = 20;
  const hw = TRACK_WIDTH * 0.5 + 1.5;
  const wallH = 5;
  for (let i = 0; i <= segs; i++) {
    const t = (tunnelT + (i / segs) * (tunnelLen / trackLength)) % 1;
    const p = trackPath.getPointAt(t);
    const tan = trackPath.getTangentAt(t).normalize();
    const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0, 1, 0)).normalize();
    const angle = Math.atan2(tan.x, tan.z);
    const segL = tunnelLen / segs * 1.1;
    // Left wall
    const lw = new THREE.Mesh(new THREE.BoxGeometry(0.6, wallH, segL), tunnelMat);
    lw.position.set(p.x - right.x * hw, wallH / 2, p.z - right.z * hw);
    lw.rotation.y = angle;
    lw.receiveShadow = true;
    group.add(lw);
    // Right wall
    const rw = new THREE.Mesh(new THREE.BoxGeometry(0.6, wallH, segL), tunnelMat);
    rw.position.set(p.x + right.x * hw, wallH / 2, p.z + right.z * hw);
    rw.rotation.y = angle;
    rw.receiveShadow = true;
    group.add(rw);
    // Ceiling
    const ceil = new THREE.Mesh(new THREE.BoxGeometry(TRACK_WIDTH + 3, 0.4, segL), tunnelMat);
    ceil.position.set(p.x, wallH, p.z);
    ceil.rotation.y = angle;
    ceil.receiveShadow = true;
    group.add(ceil);
  }
  return group;
}
scene.add(placeTunnel());

  for (let i = 0; i < 20; i++) {
    const { x, z } = randomTrackSide(TRACK_WIDTH * 0.55 + 1.5, TRACK_WIDTH * 0.55 + 3);
    if (isOnTrack(x, z, 1)) continue;
    const can = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.7, 0.35), trashMat);
    can.position.set(x, 0.35, z);
    can.castShadow = true;
    group.add(can);
    // Lid
    const lid = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 0.4), trashMat);
    lid.position.set(x, 0.72, z);
    group.add(lid);
  }
  return group;
}
scene.add(placeStreetFurniture());

// ── Particles: floating leaves, dust, pollen ──
const particles = [];
function createParticles() {
  const group = new THREE.Group();
  const leafMat = new THREE.MeshStandardMaterial({ color: 0x88aa44, roughness: 0.8 });
  const dustMat = new THREE.MeshStandardMaterial({ color: 0xddccaa, transparent: true, opacity: 0.5 });
  const pollenMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, transparent: true, opacity: 0.6, emissive: 0xffffaa, emissiveIntensity: 0.2 });
  const mats = [leafMat, dustMat, pollenMat];
  const sizes = [0.08, 0.04, 0.03];
  for (let i = 0; i < 120; i++) {
    const type = Math.floor(Math.random() * 3);
    const s = sizes[type] + Math.random() * sizes[type];
    const p = new THREE.Mesh(new THREE.BoxGeometry(s, s * 0.3, s), mats[type]);
    const rx = (Math.random() - 0.5) * 50;
    const ry = 0.3 + Math.random() * 5;
    const rz = (Math.random() - 0.5) * 50;
    p.position.set(rx, ry, rz);
    group.add(p);
    particles.push({
      mesh: p,
      offsetX: rx, offsetY: ry, offsetZ: rz,
      driftSpeed: 0.3 + Math.random() * 0.8,
      bobSpeed: 1 + Math.random() * 2,
      bobAmp: 0.1 + Math.random() * 0.3,
      spinSpeed: 1 + Math.random() * 3,
      phase: Math.random() * Math.PI * 2,
    });
  }
  return group;
}
const particleGroup = createParticles();
scene.add(particleGroup);

// ── Player runner: single cube ──
const player = new THREE.Mesh(
  new THREE.BoxGeometry(0.5, 1.6, 0.4),
  new THREE.MeshStandardMaterial({ color: 0xff6633, roughness: 0.5 })
);
player.castShadow = true;
scene.add(player);

// ── AI runners: single cubes ──
const aiColors = [
  0x4CAF50, 0x2196F3, 0x9C27B0, 0xF44336, 0xFF9800,
  0x00BCD4, 0xE91E63, 0x3F51B5, 0xCDDC39, 0x795548,
  0x607D8B, 0xFFEB3B
];
const aiRunners = [];

for (let i = 0; i < 12; i++) {
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1.6, 0.4),
    new THREE.MeshStandardMaterial({ color: aiColors[i], roughness: 0.5 })
  );
  mesh.castShadow = true;
  scene.add(mesh);

  aiRunners.push({
    mesh,
    t: Math.random(),
    baseSpeed: 5 + Math.random() * 12,
    speedVar: 0.5 + Math.random() * 2,
    varFreq: 0.1 + Math.random() * 0.3,
    lane: (Math.random() - 0.5) * TRACK_WIDTH * 0.6,
    phase: Math.random() * Math.PI * 2,
  });
}

// ── State ──
let playerT = 0;
const PLAYER_SPEED = 12; // km/h constant

// ── Camera ──
const CAM_DIST = 4.5;
const CAM_HEIGHT = 2.0;
const CAM_LERP = 0.045;
const camPos = new THREE.Vector3();
const camTgt = new THREE.Vector3();
let camReady = false;

// ── Animation loop ──
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();

  // Player movement
  const speedMs = PLAYER_SPEED / 3.6;
  playerT = (playerT + speedMs * dt / trackLength) % 1;

  const pp = trackPath.getPointAt(playerT);
  const pt = trackPath.getTangentAt(playerT).normalize();

  // Shared look-ahead direction (used by player facing + camera position)
  const lookAheadT = (playerT + 20 / trackLength) % 1;
  const lookPt = trackPath.getPointAt(lookAheadT);
  const lookDir = new THREE.Vector3(lookPt.x - pp.x, 0, lookPt.z - pp.z).normalize();

  // Runner height: center at 0.8 (half of 1.6), plus running bob
  const bob = Math.abs(Math.sin(time * 9)) * 0.06;
  player.position.set(pp.x, 0.8 + bob, pp.z);
  player.lookAt(pp.x + lookDir.x, 0.8, pp.z + lookDir.z);

  // AI runners
  for (const ai of aiRunners) {
    const spd = ai.baseSpeed + Math.sin(time * ai.varFreq + ai.phase) * ai.speedVar;
    ai.t = (ai.t + Math.max(0, spd) / 3.6 * dt / trackLength) % 1;

    const ap = trackPath.getPointAt(ai.t);
    const aiLookT = (ai.t + 20 / trackLength) % 1;
    const aiLookPt = trackPath.getPointAt(aiLookT);
    const aiLookDir = new THREE.Vector3(aiLookPt.x - ap.x, 0, aiLookPt.z - ap.z).normalize();
    const right = new THREE.Vector3().crossVectors(aiLookDir, new THREE.Vector3(0, 1, 0)).normalize();

    const aiBob = Math.abs(Math.sin(time * 8 + ai.phase)) * 0.06;
    const aiX = ap.x + right.x * ai.lane;
    const aiZ = ap.z + right.z * ai.lane;
    ai.mesh.position.set(aiX, 0.8 + aiBob, aiZ);
    ai.mesh.lookAt(aiX + aiLookDir.x, 0.8, aiZ + aiLookDir.z);
  }

  // Camera: position behind runner using same look-ahead direction
  const desPos = new THREE.Vector3(
    pp.x - lookDir.x * CAM_DIST,
    CAM_HEIGHT,
    pp.z - lookDir.z * CAM_DIST
  );
  const desTgt = new THREE.Vector3(pp.x, 0.9, pp.z);

  if (!camReady) {
    camPos.copy(desPos);
    camTgt.copy(desTgt);
    camReady = true;
  } else {
    camPos.lerp(desPos, CAM_LERP);
    camTgt.lerp(desTgt, CAM_LERP);
  }

  camera.position.copy(camPos);
  camera.lookAt(camTgt);

  // Sun follows player
  sun.position.set(pp.x + 80, 100, pp.z + 60);
  sun.target.position.copy(pp);

  // Lamp PointLights: snap to nearest lamp positions
  if (lampLightIntensity > 0 && lampPositions.length > 0) {
    // Find closest lamps to player
    const dists = lampPositions.map((lp, i) => ({ i, d: (lp.x - pp.x) ** 2 + (lp.z - pp.z) ** 2 }));
    dists.sort((a, b) => a.d - b.d);
    for (let i = 0; i < LAMP_LIGHT_COUNT; i++) {
      const lp = lampPositions[dists[i].i];
      lampLights[i].position.copy(lp);
      lampLights[i].intensity = lampLightIntensity;
    }
  } else {
    for (const ll of lampLights) ll.intensity = 0;
  }

  // Wind: always blow "screen-right" (perpendicular to camera) for best visibility
  const windMul = Math.max(0.3, weather.windSpeed / 10);
  const camRight = new THREE.Vector3().crossVectors(lookDir, new THREE.Vector3(0, 1, 0)).normalize();
  const wdX = camRight.x * windMul;
  const wdZ = camRight.z * windMul;

  // Clouds drift across screen
  for (const c of clouds) {
    c.mesh.position.x += (Math.sin(c.dir) * c.speed * 0.3 + wdX * 2) * dt;
    c.mesh.position.z += (Math.cos(c.dir) * c.speed * 0.3 + wdZ * 2) * dt;
  }

  // Birds fly in circles
  for (const b of birds) {
    const t2 = time * b.speed * 0.1 + b.phase;
    const radius = 8;
    b.mesh.position.x = b.cx + b.ox + Math.sin(t2 + b.dir) * radius;
    b.mesh.position.z = b.cz + b.oz + Math.cos(t2 + b.dir) * radius;
    b.mesh.position.y = b.cy + b.oy + Math.sin(time * 2 + b.phase) * 0.5;
  }

  // Particles follow player, blow across screen
  particleGroup.position.set(pp.x, 0, pp.z);
  for (const p of particles) {
    const t2 = time * p.driftSpeed * windMul + p.phase;
    p.mesh.position.x = p.offsetX + Math.sin(t2) * 4 * windMul + wdX * 3 * Math.sin(time * 0.5 + p.phase);
    p.mesh.position.y = p.offsetY + Math.sin(time * p.bobSpeed + p.phase) * p.bobAmp;
    p.mesh.position.z = p.offsetZ + Math.cos(t2 * 0.7) * 4 * windMul + wdZ * 3 * Math.sin(time * 0.5 + p.phase);
    p.mesh.rotation.y = time * p.spinSpeed * windMul;
    p.mesh.rotation.x = time * p.spinSpeed * 0.5 * windMul;
  }

  // Rain — falls diagonally, drop mesh aligned to velocity vector
  rainGroup.position.set(pp.x, 0, pp.z);
  const rainDriftX = wdX * 0.3;
  const rainDriftZ = wdZ * 0.3;
  for (const r of rainDrops) {
    const horizSpeed = r.speed * windMul * 0.3;
    r.mesh.position.y -= r.speed * dt;
    r.ox += rainDriftX * r.speed * dt;
    r.oz += rainDriftZ * r.speed * dt;
    r.mesh.position.x = r.ox;
    r.mesh.position.z = r.oz;
    // Align drop to its velocity: point from current pos toward (pos + velocity)
    const vy = -r.speed;
    const vx = rainDriftX * r.speed;
    const vz = rainDriftZ * r.speed;
    r.mesh.lookAt(r.mesh.position.x + vx, r.mesh.position.y + vy, r.mesh.position.z + vz);
    if (r.mesh.position.y < 0) {
      r.mesh.position.y = 17 + Math.random() * 5;
      r.ox = (Math.random() - 0.5) * 65;
      r.oz = (Math.random() - 0.5) * 65;
    }
  }

  // Snow — drifts diagonally across screen with sway
  snowGroup.position.set(pp.x, 0, pp.z);
  for (const s of snowFlakes) {
    s.mesh.position.y -= s.speed * dt;
    s.ox += wdX * s.speed * 0.5 * dt;
    s.oz += wdZ * s.speed * 0.5 * dt;
    s.mesh.position.x = s.ox + Math.sin(time * 0.5 + s.drift) * 3;
    s.mesh.position.z = s.oz + Math.cos(time * 0.3 + s.drift) * 3;
    s.mesh.rotation.y = time * 0.5;
    s.mesh.rotation.x = time * 0.3 + s.drift;
    if (s.mesh.position.y < 0) {
      s.mesh.position.y = 15 + Math.random() * 5;
      s.ox = (Math.random() - 0.5) * 60;
      s.oz = (Math.random() - 0.5) * 60;
    }
  }

  renderer.render(scene, camera);
}

// ── Resize (maintain 9:16) ──
window.addEventListener('resize', () => {
  const { w, h } = calcSize();
  renderer.setSize(w, h);
});

// ── Start ──
const sp = trackPath.getPointAt(0);
const st = trackPath.getTangentAt(0).normalize();
camera.position.set(sp.x - st.x * CAM_DIST, CAM_HEIGHT, sp.z - st.z * CAM_DIST);
camera.lookAt(sp);
animate();
</script>
</body>
